services:
  mysql:
    image: mysql:8 

    container_name: mysql 

    restart: always 

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: feedbackdb 

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d  
    
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - feedback-net 
    
  flask:

    build: . 

    container_name: flask 
    restart: always 

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      MYSQL_HOST: mysql  
      MYSQL_USER: root 
      MYSQL_PASSWORD: root123 
      MYSQL_DATABASE: feedbackdb 

    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000/health"]
      interval: 10s 
      timeout: 5s 
      retries: 5

    networks:
      - feedback-net 
    
  nginx:
    image: nginx:latest 

    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
        flask:
          condition: service_healthy 
    networks:
      - feedback-net 

volumes:
  mysql_data:

networks:
  feedback-net:
    



